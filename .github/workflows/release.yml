name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          for dir in */; do
            echo "Found artifact: $dir"
          done
          
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            tc-linux-gcc/tc-linux-gcc.tar.gz \
            tc-windows-msvc/tc-windows-msvc.zip