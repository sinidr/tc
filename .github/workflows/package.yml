name: Package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Configure Conan
        run: conan profile detect --force

      - name: Create package (GCC)
        run: conan create . --build=missing -pr .conan/profiles/gcc

      - name: Archive Conan package
        run: |
          PKG_PATH="$HOME/.conan2/p/tc/0.1/gcc/release/x86_64"
          tar czvf tc-conan-package.tar.gz -C "$PKG_PATH" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-conan-package
          path: tc-conan-package.tar.gz

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Create package (MSVC)
        run: conan create . --build=missing -pr .conan/profiles/msvc

      - name: Archive Conan package
        run: |
          $pkgPath = "$env:USERPROFILE\.conan2\p\tc\0.1\msvc\release\x86_64"
          Compress-Archive -Path "$pkgPath\*" -DestinationPath tc-conan-package.zip
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-conan-package-windows
          path: tc-conan-package.zip