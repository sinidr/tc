name: Package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Configure Conan
        run: conan profile detect --force

      - name: Build (GCC)
        run: |
          conan install . --build=missing -pr .conan/profiles/gcc
          cmake --preset conan-release
          cmake --build --preset conan-release
          cmake --install --preset conan-release

      - name: Package
        run: |
          cd install
          tar czvf ../tc-linux-gcc.tar.gz *
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-linux-gcc
          path: tc-linux-gcc.tar.gz

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Configure Conan
        run: conan profile detect --force

      - name: Build (MSVC)
        run: |
          conan install . --build=missing -s build_type=Release
          cmake --preset conan-release
          cmake --build --preset conan-release
          cmake --install --preset conan-release

      - name: Package
        run: |
          Compress-Archive -Path install\* -DestinationPath tc-windows-msvc.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-windows-msvc
          path: tc-windows-msvc.zip