name: Sanitizer

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sanitizer-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Configure Conan
        run: conan profile detect --force

      - name: Configure GCC with Sanitizers
        run: conan install . --build=missing -pr .conan/profiles/gcc -DENABLE_SANITIZERS=ON

      - name: Configure CMake
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test with ASan
        run: ctest --preset conan-release --output-on-failure

  sanitizer-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Configure Conan
        run: conan profile detect --force

      - name: Install Clang
        run: sudo apt-get install -y clang-14

      - name: Install libc++
        run: sudo apt-get install -y libc++-14-dev libc++abi-14-dev

      - name: Configure Clang with Sanitizers
        run: conan install . --build=missing -pr .conan/profiles/clang -DENABLE_SANITIZERS=ON

      - name: Configure CMake
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test with ASan
        run: ctest --preset conan-release --output-on-failure